[project]
name = "agent_finance"
version = "0.1.0"
description = "Turn AI agents into your personal financial assistant"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "typer>=0.24.0",
    "yfinance>=1.2.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mtool"]

[project.scripts]
mtool = "mtool.cli:app"
